<ion-header>
  <ion-toolbar color="primary">
    <ion-title>My Lists</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="lists-content">

  <!-- Empty state -->
  <div class="empty-state" *ngIf="lists.length === 0">
    <ion-icon name="albums-outline"></ion-icon>
    <p>No lists yet</p>
    <ion-button fill="outline" size="small" (click)="onAdd()">
      <ion-icon name="add" slot="start"></ion-icon>
      Create your first list
    </ion-button>
  </div>

  <div class="lists-grid" *ngIf="lists.length > 0">
    <div class="list-card" *ngFor="let list of lists" [style.--lc]="list.color" (click)="onTap(list)">
      <div class="lc-accent"></div>
      <div class="lc-body">
        <div class="lc-dot" [style.background]="list.color"></div>
        <div class="lc-info">
          <h3>{{ list.listName }}</h3>
          <p>{{ list.description || 'Tap to open or manage' }}</p>
        </div>
        <div class="lc-count" [style.background]="list.color + '18'" [style.color]="list.color">
          {{ list.itemCount }}
        </div>
      </div>
      <div class="lc-footer">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>Created {{ list.createdAt }}</span>
        <span class="lc-hint">
          <ion-icon name="ellipsis-vertical-outline"></ion-icon>
        </span>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="onAdd()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
