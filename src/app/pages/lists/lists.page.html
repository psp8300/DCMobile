<ion-header>
  <ion-toolbar color="primary">
    <ion-title>My Lists</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="lists-content">
  <div class="lists-grid">
    <div class="list-card" *ngFor="let list of lists" [style.--lc]="list.color">
      <div class="lc-accent"></div>
      <div class="lc-body">
        <div class="lc-dot" [style.background]="list.color"></div>
        <div class="lc-info">
          <h3>{{ list.listName }}</h3>
          <p>{{ list.description }}</p>
        </div>
        <div class="lc-count" [style.background]="list.color + '18'" [style.color]="list.color">
          {{ list.itemCount }}
        </div>
      </div>
      <div class="lc-footer">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>Created {{ list.createdAt }}</span>
      </div>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="onAdd()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-toast [isOpen]="showToast" message="Add list — coming soon in live version." duration="2000" color="primary" position="bottom" icon="information-circle-outline"></ion-toast>
</ion-content>
