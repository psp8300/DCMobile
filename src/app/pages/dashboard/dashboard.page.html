<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      <div class="toolbar-brand">
        <ion-icon name="layers"></ion-icon>
        <span>DClutter</span>
        <ion-badge color="warning" class="demo-badge">DEMO</ion-badge>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="dash-content">

  <!-- Welcome banner -->
  <div class="welcome-banner">
    <div class="wb-text">
      <p class="wb-date">{{ today | date:'EEEE, d MMM' }}</p>
      <h2>Good {{ greeting }},<br>Demo User 👋</h2>
    </div>
    <div class="wb-avatar">DU</div>
  </div>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-pill" *ngFor="let s of stats">
      <div class="sp-icon" [style.background]="s.color + '20'">
        <ion-icon [name]="s.icon" [style.color]="s.color"></ion-icon>
      </div>
      <div class="sp-info">
        <span class="sp-val">{{ s.value }}</span>
        <span class="sp-label">{{ s.label }}</span>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="section-header">
    <span>Quick Access</span>
  </div>
  <div class="quick-grid">
    <div class="quick-card" *ngFor="let q of quickActions" [style.--qc-color]="q.color">
      <ion-icon [name]="q.icon"></ion-icon>
      <span>{{ q.label }}</span>
    </div>
  </div>

  <!-- Workday section -->
  <div class="section-header">
    <span>Workday</span>
  </div>
  <div class="workday-grid">
    <div class="wd-card" *ngFor="let w of workdayActions" [routerLink]="w.route" [style.--wdc-color]="w.color">
      <div class="wdc-icon">
        <ion-icon [name]="w.icon" [style.color]="w.color"></ion-icon>
      </div>
      <span class="wdc-label">{{ w.label }}</span>
    </div>
  </div>

  <!-- Recent activity -->
  <div class="section-header">
    <span>Recent Activity</span>
    <span class="see-all">See all</span>
  </div>

  <div class="activity-timeline">
    <div class="tl-item" *ngFor="let a of recentActivities; let last = last">
      <div class="tl-left">
        <div class="tl-dot" [style.background]="activityColor(a.activityName)">
          <ion-icon [name]="activityIcon(a.activityName)"></ion-icon>
        </div>
        <div class="tl-line" *ngIf="!last"></div>
      </div>
      <div class="tl-card">
        <div class="tl-title">{{ a.activityName }}</div>
        <p class="tl-notes">{{ a.notes }}</p>
        <div class="tl-meta">
          <ion-icon name="calendar-outline"></ion-icon> {{ a.date }}
          &nbsp;·&nbsp;
          <ion-icon name="time-outline"></ion-icon> {{ formatDuration(a.durationMinutes || 0) }}
        </div>
      </div>
    </div>
  </div>

</ion-content>
